<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operux CRM — Maylo asistente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --violet:#7F77DD; --violet-d:#6058B9; --yellow:#F5C400; --cyan:#27C3D8; --mag:#B57BE0;
    --bg:#0a0a0f; --panel:#13131c; --panel2:#181826; --line:#23232f; --line2:#2c2c3b;
    --ink:#ECECF4; --muted:#8a8a9c; --muted2:#6a6a7c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  #root{height:100%}
  .app{display:grid;grid-template-columns:236px 1fr;height:100vh;position:relative}

  /* ---------- sidebar ---------- */
  .side{background:#0c0c13;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:22px 16px;gap:8px}
  .logo{display:flex;align-items:center;gap:10px;padding:4px 8px 18px}
  .logo-mark{width:34px;height:34px;display:flex}
  .logo-mark svg{width:100%}
  .logo-tx{font-weight:800;font-size:20px;letter-spacing:-.02em}
  .logo-tx i{color:var(--violet);font-style:normal}
  .nav{display:flex;flex-direction:column;gap:4px;margin-top:6px}
  .nav-i{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;border:0;background:transparent;color:var(--muted);font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;transition:.15s;text-align:left}
  .nav-i:hover{background:#15151f;color:var(--ink)}
  .nav-i.on{background:#1b1830;color:#fff}
  .nav-i.on svg{color:var(--violet)}
  .shop{margin-top:auto;display:flex;align-items:center;gap:11px;padding:12px;background:#101019;border:1px solid var(--line);border-radius:14px}
  .shop b{font-size:13px;font-weight:700;display:block}
  .shop span{font-size:11.5px;color:var(--muted)}
  .avatar{width:34px;height:34px;flex:none;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800}

  /* ---------- main ---------- */
  .main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 32px 18px;border-bottom:1px solid var(--line);gap:20px}
  .topbar>div:first-child{min-width:0;flex:none}
  .topbar h1{font-size:25px;font-weight:800;letter-spacing:-.02em;white-space:nowrap}
  .topbar p{font-size:13.5px;color:var(--muted);margin-top:3px}
  .top-actions{display:flex;align-items:center;gap:10px}
  .searchbox{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 13px;color:var(--muted);width:260px}
  .searchbox input{background:transparent;border:0;outline:0;color:var(--ink);font-family:inherit;font-size:13.5px;width:100%}
  .searchbox input::placeholder{color:var(--muted2)}
  .icon-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .icon-btn:hover{color:var(--ink);border-color:var(--line2)}
  .content{flex:1;overflow:auto;padding:24px 32px 40px}

  /* ---------- agenda board ---------- */
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:10px}
  .col-head{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;padding:4px 4px 8px}
  .bdot{width:10px;height:10px;border-radius:50%}
  .appt{position:relative;background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:12px 13px;display:flex;flex-direction:column;gap:3px}
  .appt-t{font-size:12px;color:var(--muted);font-weight:700}
  .appt-c{font-weight:700;font-size:14px}
  .appt-s{font-size:12.5px;color:var(--muted)}
  .appt.now{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan), 0 0 22px -8px var(--cyan)}
  .appt.done{opacity:.62}
  .appt.free{border-style:dashed;border-color:var(--line2);background:transparent}
  .appt-free{display:flex;align-items:center;gap:8px;color:var(--muted);font-weight:600;font-size:13px;justify-content:center;padding:4px 0}
  .pill{position:absolute;top:11px;right:11px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
  .pill.done{background:#1f2a22;color:#5fb98a}
  .pill.now{background:#06303a;color:var(--cyan)}
  .pill.next{background:#241f47;color:#a79df0}

  /* ---------- tables ---------- */
  .panelcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .tbl-head,.tbl-row{display:grid;grid-template-columns:1.6fr 1.1fr .7fr 1fr 1.1fr;align-items:center;gap:12px;padding:14px 20px}
  .tbl-head.caja,.tbl-row.caja{grid-template-columns:.7fr 1.6fr 1.4fr 1fr .9fr}
  .tbl-head{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);font-weight:700;border-bottom:1px solid var(--line)}
  .tbl-row{border-bottom:1px solid #1b1b27;font-size:14px}
  .tbl-row:last-child{border-bottom:0}
  .tbl-row:hover{background:#15151f}
  .cell-name{display:flex;align-items:center;gap:11px;font-weight:600}
  .muted{color:var(--muted)}
  .r{text-align:right}.strong{font-weight:800}
  .tag{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;font-style:normal}
  .method{font-size:12px;color:var(--muted);background:#15151f;border:1px solid var(--line);padding:3px 9px;border-radius:999px;font-style:normal}

  /* ---------- caja / reportes ---------- */
  .caja-wrap{display:flex;flex-direction:column;gap:16px}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .stat-row.four{grid-template-columns:repeat(4,1fr)}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
  .stat-k{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:8px}
  .stat-v{font-size:28px;font-weight:800;letter-spacing:-.02em}
  .stat-v.sm{font-size:20px}
  .chart{padding:22px 24px}
  .chart-head{font-size:14px;font-weight:700;margin-bottom:20px}
  .bars{display:flex;align-items:flex-end;gap:18px;height:190px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:9px;height:100%;justify-content:flex-end}
  .bar{width:100%;max-width:46px;background:linear-gradient(to top,var(--violet-d),var(--violet));border-radius:8px 8px 0 0;position:relative;display:flex;justify-content:center;min-height:14px;transition:.3s}
  .bar span{position:absolute;top:-20px;font-size:12px;font-weight:700;color:var(--muted)}
  .bar-col:nth-child(6) .bar{background:linear-gradient(to top,#b89400,var(--yellow))}
  .bar-d{font-size:12px;color:var(--muted);font-weight:600}

  /* ---------- Maylo dock / FAB / peek ---------- */
  .maylo-dock{position:absolute;right:26px;bottom:24px;z-index:40;display:flex;flex-direction:column;align-items:flex-end;gap:14px}
  .fab{position:relative;width:66px;height:66px;border-radius:20px;border:1px solid #2c2752;cursor:pointer;
    background:radial-gradient(120% 120% at 50% 20%,#23204a,#15131f);display:flex;align-items:center;justify-content:center;transition:.2s;box-shadow:0 14px 40px -12px rgba(127,119,221,.7)}
  .fab:hover{transform:translateY(-3px)}
  .fab.active{border-color:var(--violet)}
  .fab-maylo{width:46px;display:flex}
  .fab-maylo svg{width:100%}
  .fab-ring{position:absolute;inset:-4px;border-radius:22px;border:2px solid var(--violet);opacity:0;animation:ring 2.6s ease-out infinite}
  @keyframes ring{0%{opacity:.6;transform:scale(.9)}80%,100%{opacity:0;transform:scale(1.25)}}

  .peek{position:relative;max-width:268px;background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:15px 16px;cursor:pointer;box-shadow:0 18px 50px -18px rgba(0,0,0,.8);animation:pop .35s cubic-bezier(.2,1.3,.4,1)}
  .peek::after{content:"";position:absolute;bottom:-7px;right:26px;width:14px;height:14px;background:var(--panel);border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);transform:rotate(45deg)}
  .peek p{font-size:13.5px;line-height:1.45;color:var(--ink)}
  .peek-cta{display:inline-block;margin-top:8px;font-size:12.5px;font-weight:700;color:var(--cyan)}
  .peek-x{position:absolute;top:8px;right:10px;background:0;border:0;color:var(--muted2);font-size:17px;cursor:pointer;line-height:1}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}

  /* ---------- help drawer ---------- */
  .scrim{position:absolute;inset:0;background:rgba(5,5,9,.5);z-index:45;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .drawer{position:absolute;top:0;right:0;height:100%;width:372px;background:#101018;border-left:1px solid var(--line2);z-index:50;
    transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:22px 22px 24px;overflow-y:auto}
  .drawer.open{transform:none;box-shadow:-30px 0 80px -30px rgba(0,0,0,.9)}
  .drawer-top{display:flex;align-items:center;gap:13px;padding-bottom:6px}
  .dr-maylo-wrap{width:58px;height:58px;flex:none;border-radius:16px;background:radial-gradient(120% 120% at 50% 20%,#23204a,#15131f);border:1px solid #2c2752;display:flex;align-items:center;justify-content:center}
  .dr-maylo{width:42px;display:flex}
  .dr-maylo svg{width:100%}
  .dr-id b{font-size:16px;font-weight:800;display:block}
  .dr-id span{font-size:12.5px;color:var(--muted)}
  .dr-x{margin-left:auto;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .dr-x:hover{color:var(--ink)}
  .bubble{margin:16px 0 6px;background:#191730;border:1px solid #2a2750;border-radius:14px;border-top-left-radius:4px;padding:14px 16px;font-size:14px;line-height:1.55;color:#e4e1f5}
  .dr-sec{font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);font-weight:800;margin:20px 2px 11px}
  .tips{list-style:none;display:flex;flex-direction:column;gap:11px}
  .tips li{display:flex;gap:11px;font-size:13.5px;line-height:1.45;color:#cfcfe0}
  .tk{width:7px;height:7px;border-radius:50%;background:var(--cyan);margin-top:6px;flex:none;box-shadow:0 0 8px var(--cyan)}
  .qa{display:flex;flex-direction:column;gap:9px}
  .qa-btn{display:flex;align-items:center;gap:11px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
  .qa-btn:hover{border-color:var(--violet);background:#1b1830}
  .qa-btn svg{color:var(--violet)}
  .celebrate{margin-top:22px;background:linear-gradient(90deg,var(--violet),#9b58c9);border:0;color:#fff;font-family:inherit;font-weight:800;font-size:14.5px;padding:14px;border-radius:13px;cursor:pointer;transition:.15s}
  .celebrate:hover{filter:brightness(1.08)}

  /* ---------- toast ---------- */
  .toast{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:60;background:#1c1830;border:1px solid #322c58;color:#efeefb;
    padding:12px 20px;border-radius:13px;font-size:14px;font-weight:600;box-shadow:0 16px 40px -16px rgba(0,0,0,.8);animation:pop .3s}

  /* ---------- confetti ---------- */
  .confetti{position:absolute;inset:0;z-index:55;pointer-events:none;overflow:hidden}
  .confetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:fall 2.4s linear forwards}
  @keyframes fall{to{transform:translateY(104vh) rotate(520deg);opacity:.9}}

  /* ---------- SKA dance ---------- */
  .dancing{animation:sk-body .5s ease-in-out infinite}
  @keyframes sk-body{0%{transform:translateY(1px) rotate(-4deg)}50%{transform:translateY(-12px) rotate(4deg)}100%{transform:translateY(1px) rotate(-4deg)}}
  .dancing .my-wave{animation:sk-wave .5s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 92%}
  @keyframes sk-wave{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(16deg)}}
  .dancing .my-armL{animation:sk-arml .5s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 12%}
  @keyframes sk-arml{0%,100%{transform:rotate(12deg)}50%{transform:rotate(-18deg)}}
  .dancing .my-legL{animation:sk-legl .5s ease-in-out infinite}
  .dancing .my-legR{animation:sk-legr .5s ease-in-out infinite}
  @keyframes sk-legl{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-8px) scaleY(.82)}}
  @keyframes sk-legr{0%,100%{transform:translateY(-8px) scaleY(.82)}50%{transform:translateY(0) scaleY(1)}}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .side{display:none}
    .board{grid-template-columns:1fr}
    .stat-row,.stat-row.four{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="maylo.js"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
